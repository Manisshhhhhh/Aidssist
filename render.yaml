services:
  - type: web
    name: aidssist-api
    runtime: python
    plan: starter
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn backend.aidssist_runtime.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /readyz
    autoDeploy: true
    envVars:
      - key: AIDSSIST_ENV
        value: production
      - key: AIDSSIST_OBJECT_STORE_BACKEND
        value: local
      - key: AIDSSIST_REDIS_URL
        value: ""
      - key: AIDSSIST_CORS_ORIGINS
        sync: false
      - key: AIDSSIST_API_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
