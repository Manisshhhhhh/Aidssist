worker_processes auto;

events {
    worker_connections 4096;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 500m;

    log_format json_combined escape=json
        '{"time":"$time_iso8601","remote_addr":"$remote_addr","request_id":"$request_id","request":"$request","status":$status,'
        '"bytes_sent":$body_bytes_sent,"request_time":$request_time,"upstream_response_time":"$upstream_response_time",'
        '"upstream_addr":"$upstream_addr","http_referer":"$http_referer","http_user_agent":"$http_user_agent"}';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    upstream streamlit_ui {
        least_conn;
        server streamlit-ui:8501 resolve;
        keepalive 64;
    }

    upstream fastapi_api {
        least_conn;
        server fastapi-api:8000 resolve;
        keepalive 64;
    }

    server {
        listen 80;
        server_name _;

        location = /nginx_status {
            stub_status;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
        }

        location /api/ {
            limit_req zone=api_limit burst=40 nodelay;
            limit_conn conn_limit 50;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Request-Id $request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_pass http://fastapi_api/;
        }

        location / {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Request-Id $request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_pass http://streamlit_ui;
        }
    }
}
